server {
  listen 80;
  server_name localhost;

  # Docker DNS for dynamic service discovery (avoids stale upstream IP after container recreate)
  resolver 127.0.0.11 valid=30s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse proxy: forward /api requests to the backend container
  location /api/ {
    set $api_upstream  http://api:80;
    proxy_pass         $api_upstream;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_read_timeout 420s;
    proxy_send_timeout 420s;
    client_max_body_size 50M;
  }

  # Reverse proxy: health checks
  location /health/ {
    set $api_upstream  http://api:80;
    proxy_pass         $api_upstream;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # Reverse proxy: swagger
  location /swagger {
    set $api_upstream  http://api:80;
    proxy_pass         $api_upstream;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # Flutter web SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Increase buffer sizes for larger assets
  client_max_body_size 50M;
}
