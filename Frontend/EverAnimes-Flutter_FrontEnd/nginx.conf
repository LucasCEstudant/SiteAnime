server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse proxy: forward /api requests to the backend container
  location /api/ {
    proxy_pass         http://api:80/api/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    client_max_body_size 50M;
  }

  # Reverse proxy: health checks
  location /health/ {
    proxy_pass         http://api:80/health/;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # Reverse proxy: swagger
  location /swagger {
    proxy_pass         http://api:80/swagger;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # Flutter web SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Increase buffer sizes for larger assets
  client_max_body_size 50M;
}
